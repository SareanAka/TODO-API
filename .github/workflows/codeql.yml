name: CodeQL Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 6 * * 1" # Weekly scan every Monday at 06:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

env:
  API_PROJECT: "./TODO API/TODO API.csproj"

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore & Build
        run: dotnet build "${{ env.API_PROJECT }}" -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
