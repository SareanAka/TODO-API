name: CI # Testing deployment workflow for Azure Web App

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIGURATION: Release
  API_PROJECT: "./TODO API/TODO API.csproj"
  TEST_PROJECT: "./TodoApi.Tests/TodoApi.Tests.csproj"
  ARTIFACT_NAME: todoapi-drop
  AZURE_WEBAPP_NAME: freeToDoApp

jobs:
  build_test_publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Restore
        run: | 
          dotnet restore "${{ env.API_PROJECT }}"
          dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Build (API)
        run: dotnet build "${{ env.API_PROJECT }}" -c "${{ env.CONFIGURATION }}" --no-restore

        
      - name: Build (Tests)
        run: dotnet build "${{ env.TEST_PROJECT }}" -c "${{ env.CONFIGURATION }}" --no-restore


      - name: Test
        run: >
          dotnet test "${{ env.TEST_PROJECT }}"
          -c "${{ env.CONFIGURATION }}"
          --no-build
          --logger "trx;LogFileName=test_results.trx"
          --collect:"XPlat Code Coverage"

      - name: Publish (API)
        run: dotnet publish "${{ env.API_PROJECT }}" -c "${{ env.CONFIGURATION }}" --no-build -o ./out/publish

      - name: Upload build artifact (published output)
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./out/publish
          if-no-files-found: error
          retention-days: 7

      - name: Upload test results + coverage
        uses: actions/upload-artifact@v5
        with:
          name: test-results-and-coverage
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 7

  deploy:
    name: Deploy to Azure App Service
    needs: build_test_publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v5
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish