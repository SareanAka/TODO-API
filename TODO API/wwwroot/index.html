<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f2f2f7;
            color: #1c1c1e;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            font-size: 17px;
            min-height: 100vh;
            padding: 52px 20px 40px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 660px; margin: 0 auto; }

        /* ── Header ── */
        .header { margin-bottom: 32px; }

        .header h1 {
            font-size: 2.4em;
            font-weight: 700;
            letter-spacing: -0.8px;
            color: #1c1c1e;
        }

        .header .subtitle {
            font-size: 0.92em;
            color: rgba(60, 60, 67, 0.55);
            margin-top: 4px;
        }

        /* ── Cards ── */
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
        }

        .card-label {
            font-size: 0.72em;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: rgba(60, 60, 67, 0.5);
            margin-bottom: 14px;
        }

        /* ── Add task form ── */
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .input-group:last-child { margin-bottom: 0; }

        input[type="text"],
        input[type="datetime-local"] {
            flex: 1;
            background: #f2f2f7;
            border: none;
            border-radius: 10px;
            color: #1c1c1e;
            font-family: inherit;
            font-size: 0.97em;
            padding: 11px 14px;
            outline: none;
            transition: background 0.15s;
            min-width: 0;
        }

        input::placeholder { color: rgba(60, 60, 67, 0.35); }
        input:focus { background: #e9e9ef; }

        input[type="datetime-local"] { color-scheme: light; }

        .btn-add {
            background: #007aff;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 600;
            padding: 11px 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.15s, transform 0.1s;
            flex-shrink: 0;
        }

        .btn-add:hover  { opacity: 0.88; }
        .btn-add:active { opacity: 0.75; transform: scale(0.97); }

        /* ── Todo list ── */
        .todo-list { list-style: none; }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 4px;
            border-bottom: 1px solid rgba(60, 60, 67, 0.1);
            transition: background 0.1s;
        }

        .todo-item:first-child { padding-top: 0; }
        .todo-item:last-child  { border-bottom: none; padding-bottom: 0; }

        /* Circular checkbox */
        .todo-check {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid #c7c7cc;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            padding: 0;
            transition: border-color 0.15s, background 0.15s;
            font-size: 13px;
            color: transparent;
        }

        .todo-check.checked {
            background: #34c759;
            border-color: #34c759;
            color: #fff;
        }

        .todo-check:not(.checked):hover { border-color: #007aff; }

        .todo-info { flex: 1; min-width: 0; }

        .todo-title {
            font-size: 0.97em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .todo-title.done {
            text-decoration: line-through;
            color: rgba(60, 60, 67, 0.38);
        }

        .todo-due {
            font-size: 0.78em;
            color: rgba(60, 60, 67, 0.48);
            margin-top: 2px;
        }

        .todo-due.overdue { color: #ff3b30; }

        .btn-del {
            background: none;
            border: none;
            color: #c7c7cc;
            font-size: 1.3em;
            line-height: 1;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            flex-shrink: 0;
            transition: color 0.15s, background 0.15s;
        }

        .btn-del:hover {
            color: #ff3b30;
            background: rgba(255, 59, 48, 0.08);
        }

        /* ── States ── */
        .empty-msg, .loading {
            text-align: center;
            padding: 28px 0 8px;
            color: rgba(60, 60, 67, 0.4);
            font-size: 0.95em;
        }

        /* ── Footer / status ── */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 4px 0;
            font-size: 0.78em;
            color: rgba(60, 60, 67, 0.45);
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: rgba(40, 40, 40, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-family: inherit;
            font-size: 0.88em;
            font-weight: 500;
            padding: 10px 22px;
            border-radius: 24px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s, transform 0.22s;
            z-index: 1000;
        }

        .toast.err { background: rgba(200, 40, 30, 0.88); }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>Tasks</h1>
        <p class="subtitle">Keep track of what matters.</p>
    </div>

    <div class="card">
        <div class="card-label">New Task</div>
        <div class="input-group">
            <input type="text" id="titleInput" placeholder="What needs to be done?" maxlength="200" />
            <button class="btn-add" id="addBtn">Add</button>
        </div>
        <div class="input-group">
            <input type="datetime-local" id="dueInput" />
        </div>
    </div>

    <div class="card">
        <div class="card-label">Task List</div>
        <ul class="todo-list" id="todoList">
            <li class="loading">Loading…</li>
        </ul>
    </div>

    <div class="status-bar">
        <span id="statusTotal">0 tasks</span>
        <span id="statusPending">0 pending</span>
        <span id="statusDone">0 completed</span>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
    const API = '/todos';

    // ── Fetch & render ──────────────────────────────────────────────────────

    async function fetchTodos() {
        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            renderTodos(await res.json());
        } catch (e) {
            toast('Failed to load tasks: ' + e.message, true);
            document.getElementById('todoList').innerHTML = '<li class="empty-msg">Could not load tasks.</li>';
        }
    }

    function renderTodos(todos) {
        const list = document.getElementById('todoList');
        const done = todos.filter(t => t.isCompleted).length;

        document.getElementById('statusTotal').textContent   = `${todos.length} task${todos.length !== 1 ? 's' : ''}`;
        document.getElementById('statusPending').textContent = `${todos.length - done} pending`;
        document.getElementById('statusDone').textContent    = `${done} completed`;

        if (todos.length === 0) {
            list.innerHTML = '<li class="empty-msg">No tasks yet. Add one above.</li>';
            return;
        }

        list.innerHTML = '';
        todos.forEach(t => {
            const due      = new Date(t.dueDateTime);
            const overdue  = !t.isCompleted && due < new Date();
            const dueLabel = due.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `
                <button class="todo-check${t.isCompleted ? ' checked' : ''}" data-id="${t.id}" data-done="${t.isCompleted}" title="Toggle complete">✓</button>
                <div class="todo-info">
                    <div class="todo-title${t.isCompleted ? ' done' : ''}">${esc(t.title)}</div>
                    <div class="todo-due${overdue ? ' overdue' : ''}">${dueLabel}${overdue ? ' · Overdue' : ''}</div>
                </div>
                <button class="btn-del" data-del="${t.id}" title="Delete task">×</button>
            `;
            list.appendChild(li);
        });
    }

    // ── Actions ─────────────────────────────────────────────────────────────

    async function createTodo() {
        const title  = document.getElementById('titleInput').value.trim();
        const dueRaw = document.getElementById('dueInput').value;

        if (!title) { toast('Title is required.', true); return; }

        const body = { title };
        if (dueRaw) body.dueDateTime = new Date(dueRaw).toISOString();

        try {
            const res = await fetch(API, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(body)
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.title ?? err.error ?? `HTTP ${res.status}`);
            }
            document.getElementById('titleInput').value = '';
            document.getElementById('dueInput').value   = '';
            toast('Task added');
            await fetchTodos();
        } catch (e) {
            toast(e.message, true);
        }
    }

    async function deleteTodo(id) {
        try {
            const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            toast('Task deleted');
            await fetchTodos();
        } catch (e) {
            toast(e.message, true);
        }
    }

    async function toggleTodo(id, isCompleted) {
        try {
            const res = await fetch(`${API}/${id}`, {
                method:  'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ isCompleted: !isCompleted })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            await fetchTodos();
        } catch (e) {
            toast(e.message, true);
        }
    }

    // ── Event delegation ─────────────────────────────────────────────────────

    document.getElementById('addBtn').addEventListener('click', createTodo);
    document.getElementById('titleInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') createTodo();
    });

    document.getElementById('todoList').addEventListener('click', e => {
        const delBtn   = e.target.closest('[data-del]');
        const checkBtn = e.target.closest('[data-id]');

        if (delBtn)        deleteTodo(Number(delBtn.dataset.del));
        else if (checkBtn) toggleTodo(Number(checkBtn.dataset.id), checkBtn.dataset.done === 'true');
    });

    // ── Helpers ──────────────────────────────────────────────────────────────

    function toast(msg, isErr = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast show' + (isErr ? ' err' : '');
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove('show'), 2600);
    }

    function esc(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    fetchTodos();
</script>
</body>
</html>
