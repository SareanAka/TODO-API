<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO.EXE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --green:      #d4a843;
            --dim-green:  #8a6420;
            --bg:         #14120a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            font-size: 18px;
            min-height: 100vh;
            padding: 24px 16px;
        }

        /* CRT scanlines */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.10) 2px,
                rgba(0,0,0,0.10) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* CRT glow on screen edges */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.45);
            pointer-events: none;
            z-index: 9998;
        }

        .container { max-width: 820px; margin: 0 auto; }

        /* ── Header ── */
        .header {
            border: 2px solid var(--green);
            padding: 14px 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 0 10px rgba(138,100,32,0.5), inset 0 0 10px rgba(212,168,67,0.03);
        }

        .header h1 {
            font-size: 2.6em;
            letter-spacing: 8px;
            text-shadow: 0 0 8px rgba(212,168,67,0.5);
        }

        .header .subtitle {
            font-size: 0.72em;
            color: var(--dim-green);
            letter-spacing: 5px;
            margin-top: 4px;
        }

        .blink { animation: blink 1s step-end infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        /* ── Panels ── */
        .panel {
            border: 1px solid var(--dim-green);
            padding: 14px 18px;
            margin-bottom: 16px;
            box-shadow: 0 0 6px rgba(0,170,0,0.25);
        }

        .panel-title {
            font-size: 0.78em;
            color: var(--dim-green);
            letter-spacing: 3px;
            margin-bottom: 14px;
        }
        .panel-title::before { content: '> '; }

        /* ── Input row ── */
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-row label {
            color: var(--dim-green);
            white-space: nowrap;
            font-size: 0.9em;
        }

        input[type="text"],
        input[type="datetime-local"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--dim-green);
            color: var(--green);
            font-family: inherit;
            font-size: 1em;
            padding: 4px 8px;
            outline: none;
        }

        input[type="text"] { flex: 1; min-width: 200px; }

        input[type="text"]:focus,
        input[type="datetime-local"]:focus {
            border-bottom-color: var(--green);
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(1) saturate(4) hue-rotate(70deg);
            cursor: pointer;
        }

        /* ── Buttons ── */
        button {
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            font-family: inherit;
            font-size: 0.85em;
            padding: 6px 14px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.08s, color 0.08s;
            white-space: nowrap;
        }

        button:hover  { background: var(--green); color: var(--bg); }
        button:active { opacity: 0.75; }

        button.danger              { border-color: #c0462a; color: #c0462a; }
        button.danger:hover        { background: #c0462a;  color: var(--bg); }

        /* ── Todo list ── */
        .todo-list { list-style: none; }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 2px;
            border-bottom: 1px solid rgba(0,170,0,0.2);
        }
        .todo-item:last-child { border-bottom: none; }

        .todo-check {
            cursor: pointer;
            color: var(--dim-green);
            font-size: 1.05em;
            flex-shrink: 0;
            user-select: none;
            transition: color 0.1s;
        }
        .todo-check:hover { color: var(--green); }

        .todo-title      { flex: 1; word-break: break-word; }
        .todo-title.done { text-decoration: line-through; color: var(--dim-green); }

        .todo-due         { font-size: 0.75em; color: var(--dim-green); white-space: nowrap; }
        .todo-due.overdue { color: #c0462a; }

        .empty-msg {
            color: var(--dim-green);
            text-align: center;
            padding: 22px;
            letter-spacing: 3px;
        }

        .loading {
            color: var(--dim-green);
            text-align: center;
            padding: 22px;
            animation: blink 1s step-end infinite;
        }

        /* ── Status bar ── */
        .status-bar {
            border: 1px solid var(--dim-green);
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            color: var(--dim-green);
            letter-spacing: 2px;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--bg);
            border: 1px solid var(--green);
            color: var(--green);
            font-family: inherit;
            font-size: 0.85em;
            padding: 10px 20px;
            letter-spacing: 2px;
            box-shadow: 0 0 12px rgba(51,255,51,0.45);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            z-index: 10000;
        }
        .toast.err  { border-color: #c0462a; color: #c0462a; box-shadow: 0 0 12px rgba(192,70,42,0.45); }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>TODO.EXE<span class="blink">_</span></h1>
        <div class="subtitle">TASK MANAGEMENT SYSTEM v1.0</div>
    </div>

    <div class="panel">
        <div class="panel-title">NEW TASK</div>
        <div class="input-row">
            <label>TITLE:</label>
            <input type="text" id="titleInput" placeholder="enter task description..." maxlength="200" />
            <label>DUE:</label>
            <input type="datetime-local" id="dueInput" />
            <button id="addBtn">[ADD]</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">TASK LIST</div>
        <ul class="todo-list" id="todoList">
            <li class="loading">LOADING...</li>
        </ul>
    </div>

    <div class="status-bar">
        <span id="statusTotal">TOTAL: 0</span>
        <span id="statusPending">PENDING: 0</span>
        <span id="statusDone">DONE: 0</span>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
    const API = '/todos';

    // ── Fetch & render ──────────────────────────────────────────────────────

    async function fetchTodos() {
        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            renderTodos(await res.json());
        } catch (e) {
            toast('ERR: ' + e.message, true);
            document.getElementById('todoList').innerHTML = '<li class="empty-msg">[ FAILED TO LOAD ]</li>';
        }
    }

    function renderTodos(todos) {
        const list  = document.getElementById('todoList');
        const done  = todos.filter(t => t.isCompleted).length;

        document.getElementById('statusTotal').textContent   = `TOTAL: ${todos.length}`;
        document.getElementById('statusPending').textContent = `PENDING: ${todos.length - done}`;
        document.getElementById('statusDone').textContent    = `DONE: ${done}`;

        if (todos.length === 0) {
            list.innerHTML = '<li class="empty-msg">[ NO TASKS FOUND ]</li>';
            return;
        }

        list.innerHTML = '';
        todos.forEach(t => {
            const due      = new Date(t.dueDateTime);
            const overdue  = !t.isCompleted && due < new Date();
            const dueLabel = due.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `
                <span class="todo-check" title="Toggle complete" data-id="${t.id}" data-done="${t.isCompleted}">${t.isCompleted ? '[X]' : '[ ]'}</span>
                <span class="todo-title${t.isCompleted ? ' done' : ''}">${esc(t.title)}</span>
                <span class="todo-due${overdue ? ' overdue' : ''}">${dueLabel}</span>
                <button class="danger" data-del="${t.id}">[DEL]</button>
            `;
            list.appendChild(li);
        });
    }

    // ── Actions ─────────────────────────────────────────────────────────────

    async function createTodo() {
        const title  = document.getElementById('titleInput').value.trim();
        const dueRaw = document.getElementById('dueInput').value;

        if (!title) { toast('ERR: TITLE IS REQUIRED', true); return; }

        const body = { title };
        if (dueRaw) body.dueDateTime = new Date(dueRaw).toISOString();

        try {
            const res = await fetch(API, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(body)
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.title ?? err.error ?? `HTTP ${res.status}`);
            }
            document.getElementById('titleInput').value = '';
            document.getElementById('dueInput').value   = '';
            toast('TASK ADDED');
            await fetchTodos();
        } catch (e) {
            toast('ERR: ' + e.message, true);
        }
    }

    async function deleteTodo(id) {
        try {
            const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            toast('TASK DELETED');
            await fetchTodos();
        } catch (e) {
            toast('ERR: ' + e.message, true);
        }
    }

    async function toggleTodo(id, isCompleted) {
        try {
            const res = await fetch(`${API}/${id}`, {
                method:  'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ isCompleted: !isCompleted })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            await fetchTodos();
        } catch (e) {
            toast('ERR: ' + e.message, true);
        }
    }

    // ── Event delegation ─────────────────────────────────────────────────────

    document.getElementById('addBtn').addEventListener('click', createTodo);
    document.getElementById('titleInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') createTodo();
    });

    document.getElementById('todoList').addEventListener('click', e => {
        const delBtn   = e.target.closest('[data-del]');
        const checkBtn = e.target.closest('[data-id]');

        if (delBtn)   deleteTodo(Number(delBtn.dataset.del));
        else if (checkBtn) toggleTodo(Number(checkBtn.dataset.id), checkBtn.dataset.done === 'true');
    });

    // ── Helpers ──────────────────────────────────────────────────────────────

    function toast(msg, isErr = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast show' + (isErr ? ' err' : '');
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove('show'), 2600);
    }

    function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    fetchTodos();
</script>
</body>
</html>
